<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <title>AWESOME-KEYBOARD!</title>
  </head>
  <body>
    <main class="machine">
      <header class="titlebar">
        <div class="brand">
          <span class="brand__icon" aria-hidden="true">⌨</span>
          <h1>Awesome Keyboard!</h1>
        </div>
        <div class="titlebar__right">
          <button
            id="minimize"
            class="window-button"
            type="button"
            aria-label="Minimize Awesome Keyboard"
            title="Minimize"
          >_</button>
          <button
            id="close"
            class="window-button"
            type="button"
            aria-label="Close Awesome Keyboard"
          >×</button>
        </div>
      </header>

      <section class="instruction">
        <button class="menu-label" type="button"><u>F</u>ile</button>
        <button class="menu-label" type="button"><u>H</u>elp</button>
        <p>Click the blue drop zone to release a ball.</p>
        <div class="batch">
          Balls: <strong id="ball-count">00</strong>
        </div>
      </section>

      <section class="board-shell" aria-label="Galton board keyboard">
        <canvas id="board" width="880" height="560"></canvas>
        <div class="glass-glare" aria-hidden="true"></div>
      </section>

      <section id="selector" class="selector" hidden aria-live="polite">
        <div class="selector__window">
          <div class="selector__titlebar">
            <span>⚠ Mystery Slot Selector</span>
          </div>
          <h2 id="selector-title">SELECTING PENALTY...</h2>
          <div class="reel-viewport">
            <div id="reel-track" class="reel-track"></div>
            <div class="reel-marker" aria-hidden="true"></div>
          </div>
          <p id="selector-result">The machine is deciding.</p>
        </div>
      </section>

      <footer class="readout">
        <span id="status">READY · CLICK THE DROP RAIL</span>
        <div class="typed">
          Last key:
          <strong id="typed-value">–</strong>
        </div>
        <span class="hotkey">Keyboard disabled while open · Ctrl+Alt+Shift+E: exit</span>
      </footer>
    </main>
    <script src="./renderer.ts"></script>
  </body>
</html>
